name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # Build frontend
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm install

      - name: Build frontend
        working-directory: server/frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: server/frontend/dist
          retention-days: 5

  # Build server (with embedded frontend)
  build-server:
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: server/backend/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        working-directory: server/backend
        run: go mod download

      - name: Build server
        working-directory: server/backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="gorat-server"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "./release/${OUTPUT_NAME}" .

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorat-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/backend/release/gorat-server*
          retention-days: 5

  # Build client
  build-client:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        working-directory: client
        run: go mod download

      - name: Build client
        working-directory: client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="gorat-client"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -ldflags="-s -w -X main.osType=${{ matrix.goos }}" -o "./release/${OUTPUT_NAME}" .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorat-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: client/release/gorat-client*
          retention-days: 5

  # Create release
  release:
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*" | head -50

      - name: Create checksums
        run: |
          find artifacts -type f -name "gorat-*" -exec sh -c '
            for f; do
              sha256sum "$f" > "$(basename "$f").sha256"
            done
          ' sh {} +

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.sha256
            artifacts/gorat-server/**
            artifacts/gorat-client/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
